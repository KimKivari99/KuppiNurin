name: Validate & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate-html:
    name: Validate HTML (W3C Nu Checker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run W3C Nu HTML Validator
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .

  validate-css:
    name: Validate CSS (Stylelint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Stylelint
        run: npm install --no-save stylelint stylelint-config-standard

      - name: Create Stylelint config
        run: |
          cat <<'EOF' > .stylelintrc.json
          {
            "extends": "stylelint-config-standard"
          }
          EOF

      - name: Run Stylelint
        run: npx stylelint "**/*.css"

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [validate-html, validate-css]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
