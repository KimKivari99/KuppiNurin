name: Validate & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "images/**"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  detect-changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      html: ${{ steps.filter.outputs.html }}
      css: ${{ steps.filter.outputs.css }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@v4

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            html:
              - '**/*.html'
            css:
              - '**/*.css'
            site:
              - '**/*.html'
              - '**/*.css'
              - '**/*.js'
              - 'images/**'

  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.html == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install HTML validator
        run: npm install --no-save --ignore-scripts html-validate

      - name: Run HTML validator
        run: npx html-validate "**/*.html"

  validate-css:
    name: Validate CSS (Stylelint)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.css == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Stylelint
        run: npm install --no-save --ignore-scripts stylelint stylelint-config-standard

      - name: Run Stylelint
        run: npx stylelint "**/*.css"

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, validate-html, validate-css]
    if: |
      always() &&
      needs.detect-changes.outputs.site == 'true' &&
      (needs.detect-changes.outputs.html != 'true' || needs.validate-html.result == 'success') &&
      (needs.detect-changes.outputs.css != 'true' || needs.validate-css.result == 'success')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
